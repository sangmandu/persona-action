name: Persona Update (reusable)

on:
  workflow_call:
    inputs:
      config:
        description: "Path to persona config YAML"
        type: string
        required: false
        default: ".persona/config.yml"
      pr_branch:
        description: "Branch name for the auto PR"
        type: string
        required: false
        default: "persona-bot/update"
      base_branch:
        description: "Base branch to open the PR against"
        type: string
        required: false
        default: "main"
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key (Mode A). Provide this OR CLAUDE_CODE_OAUTH_TOKEN."
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude Code OAuth token (Mode B). Provide this OR ANTHROPIC_API_KEY."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run persona-action
        uses: sangmandu/persona-action@main
        with:
          config: ${{ inputs.config }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ inputs.pr_branch }}
          base: ${{ inputs.base_branch }}
          title: "[persona-bot] update personas"
          commit-message: "chore(personas): automated update"
          body: |
            Automated persona update.

            This PR was generated by [persona-action](https://github.com/sangmandu/persona-action).
            See `.claude/agents/` for updated persona files and `state.json` for the processing checkpoint.
          add-paths: |
            .claude/agents/**
          delete-branch: true
